<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="chipGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- fundo com cantos arredondados -->
  <rect x="0" y="0" width="200" height="200" rx="40" fill="url(#bgGrad)"/>

  <!-- brilho sutil -->
  <circle cx="150" cy="40" r="60" fill="#ffffff" opacity="0.06"/>

  <!-- chip / circuito central -->
  <g>
    <rect x="65" y="65" width="70" height="70" rx="10" fill="url(#chipGrad)"/>
    <rect x="80" y="80" width="40" height="40" rx="6" fill="#1e3a8a"/>

    <!-- pinos do chip -->
    <g stroke="#bfdbfe" stroke-width="4" stroke-linecap="round">
      <line x1="100" y1="45" x2="100" y2="65"/>
      <line x1="100" y1="135" x2="100" y2="155"/>
      <line x1="45" y1="100" x2="65" y2="100"/>
      <line x1="135" y1="100" x2="155" y2="100"/>

      <line x1="80" y1="50" x2="80" y2="65"/>
      <line x1="120" y1="50" x2="120" y2="65"/>
      <line x1="80" y1="135" x2="80" y2="150"/>
      <line x1="120" y1="135" x2="120" y2="150"/>

      <line x1="50" y1="80" x2="65" y2="80"/>
      <line x1="50" y1="120" x2="65" y2="120"/>
      <line x1="135" y1="80" x2="150" y2="80"/>
      <line x1="135" y1="120" x2="150" y2="120"/>
    </g>
  </g>

  <!-- pequenos pontos nas pontas dos pinos -->
  <g fill="#e0f2fe">
    <circle cx="100" cy="45" r="4"/>
    <circle cx="100" cy="155" r="4"/>
    <circle cx="45" cy="100" r="4"/>
    <circle cx="155" cy="100" r="4"/>
    <circle cx="80" cy="50" r="3"/>
    <circle cx="120" cy="50" r="3"/>
    <circle cx="80" cy="150" r="3"/>
    <circle cx="120" cy="150" r="3"/>
    <circle cx="50" cy="80" r="3"/>
    <circle cx="50" cy="120" r="3"/>
    <circle cx="150" cy="80" r="3"/>
    <circle cx="150" cy="120" r="3"/>
  </g>
</svg>
