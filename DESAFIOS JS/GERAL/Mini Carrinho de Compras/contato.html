<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato - Tech Store</title>
    <link rel="stylesheet" href="style.css">
</head>


<body>

<header>

    <div class="logo">
        <h1>Tech Store</h1>
        <p>Os melhores produtos de tecnologia</p>
    </div>

    <nav>
        <ul>
            <li><a href="Inicio.html">Início</a></li>
            <li><a href="index.html#produto">Produtos</a></li>
            <li><a href="sobre.html">Sobre Nós</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>

</header>

<main class="contato">

    <h1>Entre em Contato</h1>

    <p>
        Tem alguma dúvida ou sugestão? Envie uma mensagem para nossa equipe.
    </p>

    <form id="formContato">

        <label>Nome</label>
        <input type="text" id="nome">

        <label>E-mail</label>
        <input type="email" id="email">

        <label>Assunto</label>
        <input type="text" id="assunto">

        <label>Mensagem</label>
        <textarea id="mensagem" rows="6"></textarea>

        <button type="submit">Enviar</button>

    </form>

    <p id="resultado"></p>

</main>

<script src="contato.js"></script>

</body>
</html>
