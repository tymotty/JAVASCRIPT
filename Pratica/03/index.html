<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Pratica js</title>
</head>
<body>
<body>

<div id="container">

    <div class="block">
        <h2>Botão mudar de cor</h2>
        <button class="acao" id="buttonColor">Clique para mudar de cor</button>
    </div>

    <div class="block">
        <h2>Texto Escrito</h2>
        <input class="acao" id="textoEscrito" type="text">
        <p id="textUsers"></p>
    </div>

    <div class="block">
        <h2>Lista apertando Enter</h2>
        <input class="acao" id="inputList" type="text">
        <ul id="ulList"></ul>
    </div>

    <div class="block">
        <h2>Contador com limite</h2>

        <p id="contador">0</p>

        <button class="button" id="buttonAdiciona">Adicionar</button>
        <button class="button" id="buttonReset">Reset</button>
        <button class="button" id="buttonDiminui">Diminuir</button>
    </div>

    <div class="block">
        <h2>Lista com Filtro Numero</h2>
        <input class="acao" id="inputFiltro" type="text">
        <ul id="ulFiltro">

        </ul>
        <p>Caso escreva um numero impar ele fica vermelho caso seja par fica verde</p>
    </div>

</div>

<script src="js.js"></script>

</body>
</html>
